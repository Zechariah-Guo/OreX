name: AT3 Submission Checker

on:
  push:
  pull_request:

jobs:
  at3-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # 1. Check for template files
      # -----------------------------
      - name: Fail if template files exist
        run: |
          echo "Checking for template files..."
          if grep -Ril "Template" . --include="*Template*" ; then
            echo "❌ Template files detected. Remove or rename all template files before submission."
            exit 1
          fi
          echo "✔️ No template files found."

      # -----------------------------
      # 2. Check required folder structure
      # -----------------------------
      - name: Check required folder structure
        run: |
          REQUIRED_FOLDERS=(
            "src"
            "docs"
            "docs/modelling"
            "deliverables"
            "deliverables/modelling"
            "deliverables/documentation"
            "deliverables/implementation"
            "deliverables/presentation"
          )

          for folder in "${REQUIRED_FOLDERS[@]}"; do
            if [ ! -d "$folder" ]; then
              echo "❌ Missing required folder: $folder"
              exit 1
            fi
          done

          echo "✔️ All required folders exist."

      # -----------------------------
      # 3. Report submitted + missing deliverables
      # -----------------------------
      - name: Report submitted and missing deliverables
        run: |
          echo ""
          echo "======================================="
          echo " AT3 Deliverables Submission Checklist"
          echo "======================================="
          echo ""

          MISSING=0

          report_file() {
            local label="$1"
            local base="$2"

            if [ -f "${base}.md" ]; then
              echo "✔️  $label — submitted (${base}.md)"
            elif [ -f "${base}.pdf" ]; then
              echo "✔️  $label — submitted (${base}.pdf)"
            else
              echo "❌  $label — MISSING (expected ${base}.md or ${base}.pdf)"
              MISSING=$((MISSING+1))
            fi
          }

          echo "=== Modelling Deliverables (9) ==="
          report_file "Class Diagram" "deliverables/modelling/ClassDiagram"
          report_file "Use Case Diagram" "deliverables/modelling/UseCaseDiagram"
          report_file "System Flow Diagram" "deliverables/modelling/SystemFlow"
          report_file "Data Dictionary" "deliverables/modelling/DataDictionary"
          report_file "Decision Tree" "deliverables/modelling/DecisionTree"
          report_file "Context Diagram" "deliverables/modelling/ContextDiagram"
          report_file "DFD Level 1" "deliverables/modelling/DFDLevel1"
          report_file "Structure Chart" "deliverables/modelling/StructureChart"
          report_file "Storyboard" "deliverables/modelling/Storyboard"

          echo ""
          echo "=== Documentation Deliverables (7) ==="
          report_file "Project Proposal" "deliverables/documentation/ProjectProposal"
          report_file "User Stories" "deliverables/documentation/UserStories"
          report_file "Requirements Summary" "deliverables/documentation/Requirements"
          report_file "Testing Log" "deliverables/documentation/TestingLog"
          report_file "Reflection" "deliverables/documentation/Reflection"
          report_file "References / Bibliography" "deliverables/documentation/Bibliography"
          report_file "Final Documentation" "deliverables/documentation/FinalDocumentation"

          echo ""
          echo "=== Implementation Deliverables (2) ==="
          if [ -f "deliverables/implementation/README.md" ]; then
            echo "✔️  Implementation README — submitted"
          else
            echo "❌  Implementation README — MISSING"
            MISSING=$((MISSING+1))
          fi

          if [ -d "deliverables/implementation/Screenshots" ]; then
            COUNT=$(find deliverables/implementation/Screenshots -type f | wc -l)
            echo "✔️  Screenshots folder — submitted ($COUNT files)"
          else
            echo "❌  Screenshots folder — MISSING"
            MISSING=$((MISSING+1))
          fi

          echo ""
          echo "=== Presentation Deliverables (1) ==="
          if [ -f "deliverables/presentation/PresentationSlides.pdf" ]; then
            echo "✔️  Presentation Slides — submitted"
          else
            echo "❌  Presentation Slides — MISSING"
            MISSING=$((MISSING+1))
          fi

          echo ""
          if [ "$MISSING" -gt 0 ]; then
            echo "❌ Submission incomplete — $MISSING required deliverables missing."
            exit 1
          else
            echo "🎉 All required deliverables submitted!"
          fi

      # -----------------------------
      # 4. Mermaid linting
      # -----------------------------
      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Lint Mermaid diagrams
        run: |
          echo "Checking Mermaid diagrams..."
          find . -name "*.md" -print0 | while IFS= read -r -d '' file; do
            if grep -q "```mermaid" "$file"; then
              echo "Linting $file"
              mmdc -i "$file" -o /tmp/out.png || {
                echo "❌ Mermaid rendering failed in $file"
                exit 1
              }
            fi
          done
          echo "✔️ All Mermaid diagrams render correctly."

      # -----------------------------
      # 5. Final success message
      # -----------------------------
      - name: All checks passed
        run: echo "🎉 All AT3 checks passed successfully!"
