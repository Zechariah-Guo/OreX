[pytest]
testpaths = tests
markers =
    authentication: Authentication flow tests
    market_browsing: Market overview and detail tests
    trading: Buy and sell operation tests
    portfolio: Portfolio display and calculation tests
    leaderboard: Leaderboard ranking tests
    transaction_history: Transaction history and pagination tests
    account_settings: Password change and account reset tests
    market_engine: Market engine algorithm and bot tests
    security: Security control tests
    error_handling: Error page tests
