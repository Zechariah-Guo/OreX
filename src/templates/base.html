<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OreX - A Minecraft-themed stock market simulation. Trade ores, watch prices fluctuate, and build your fortune.">
    <title>{% block title %}OreX{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/advanced.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.12"
            integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"
            crossorigin="anonymous"></script>
    {% block extra_css %}{% endblock %}
    <script>
        // Minimal inline script to prevent FOUC
        (function() {
            var theme = localStorage.getItem('orex-theme') || 'light';
            if (theme === 'system') {
                theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body class="{% if is_advanced_active %}advanced-theme{% endif %}">
    <a href="#main-content" class="skip-link">Skip to content</a>

    {% include 'partials/nav.html' %}
    {% include 'partials/flash.html' %}

    <main id="main-content">
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/footer.html' %}
    <script src="{{ url_for('static', filename='js/nav.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/notifications.js') }}" defer></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
