{% extends 'base.html' %}
{% block title %}Dashboard - OreX{% endblock %}

{% block content %}
<div class="dashboard-page">
    <div class="page-header">
        <h1>Welcome back, {{ user.username }}</h1>
        <p class="page-header__subtitle">
            Your portfolio at a glance.
            <span id="dashboard-indicator" class="htmx-indicator">Updating...</span>
        </p>
    </div>

    <!-- Live-updating section -->
    <div id="dashboard-live"
         hx-get="{{ url_for('dashboard.overview') }}"
         hx-trigger="every 20s"
         hx-swap="innerHTML"
         hx-indicator="#dashboard-indicator">
        {% include 'partials/dashboard_live.html' %}
    </div>

    <!-- Quick Links (static, no need to refresh) -->
    <div class="dashboard-actions">
        <a href="{{ url_for('market.overview') }}" class="btn btn--primary">Browse Market</a>
        <a href="{{ url_for('portfolio.overview') }}" class="btn btn--secondary">View Portfolio</a>
    </div>
</div>
{% endblock %}
