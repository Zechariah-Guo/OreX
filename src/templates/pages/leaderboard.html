{% extends 'base.html' %}
{% block title %}Leaderboard - OreX{% endblock %}

{% block content %}
<div class="leaderboard-page">
    <div class="page-header">
        <h1>Leaderboard</h1>
        <p class="page-header__subtitle">
            Ranked by total portfolio value (balance + holdings).
            <span id="leaderboard-indicator" class="htmx-indicator">Updating...</span>
        </p>
    </div>

    <div class="leaderboard-table-wrapper"
         id="leaderboard-live"
         hx-get="{{ url_for('leaderboard.overview') }}"
         hx-trigger="every 20s"
         hx-swap="innerHTML"
         hx-indicator="#leaderboard-indicator">
        {% include 'partials/leaderboard_table.html' %}
    </div>
</div>
{% endblock %}
