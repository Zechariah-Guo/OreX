{% extends 'base.html' %}
{% block title %}Login - OreX{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-card__title">Login</h1>
        <p class="auth-card__subtitle">Welcome back to OreX.</p>

        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username"
                       class="form-input" required
                       value="{{ username | default('', true) }}"
                       placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password"
                       class="form-input" required
                       placeholder="Enter your password">
                {% if login_error %}
                <p class="form-error" role="alert">{{ login_error }}</p>
                {% endif %}
            </div>

            <button type="submit" class="btn btn--primary btn--full">Login</button>
        </form>

        <p class="auth-card__footer">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
