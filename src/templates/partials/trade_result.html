<div class="trade-result trade-result--{{ status }}">
    <p class="trade-result__message">{{ message }}</p>
    {% if status == 'success' %}
    <div class="trade-result__actions">
        <a href="{{ url_for('portfolio.overview') }}" class="btn btn--small btn--primary">View Portfolio</a>
        <a href="{{ url_for('market.overview') }}" class="btn btn--small btn--secondary">Back to Market</a>
    </div>
    {% else %}
    <a href="{{ url_for('market.ore_detail', ore_id=ore_id) }}" class="btn btn--small btn--secondary">Try Again</a>
    {% endif %}
</div>
